<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>🏖️ 陈泊儒的2026暑假</title>
<meta property="og:title" content="🏖️ 陈泊儒的2026暑假">
<meta property="og:description" content="国际象棋 | 游泳集训 | 新疆旅行 | 大鹏水上运动夏令营 | 上海迪士尼营">
<meta property="og:type" content="website">
<style>
  :root {
    --bg:#f8f7f4; --card:#fff; --text:#2d2d2d; --muted:#9e9e9e; --border:#e8e8e8;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
    background:var(--bg);color:var(--text);padding:32px 20px 48px;-webkit-font-smoothing:antialiased;
  }
  .container{max-width:1060px;margin:0 auto}
  .header{text-align:center;margin-bottom:20px}
  .header h1{font-size:30px;font-weight:800;letter-spacing:1px;color:#1a1a1a;margin-bottom:4px}
  .header .sub{font-size:13px;font-weight:600;color:#fff;background:#333;padding:3px 12px;border-radius:20px;letter-spacing:2px}
  .toolbar{display:flex;justify-content:center;gap:12px;margin-bottom:24px;flex-wrap:wrap}
  .btn{padding:10px 20px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:6px}
  .btn-add{background:#333;color:#fff}
  .btn-add:hover{background:#555}
  .btn-reset{background:#fff;color:#888;border:1px solid #ddd}
  .btn-reset:hover{background:#f5f5f5}
  .months{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:28px}
  .month-card{background:var(--card);border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.04),0 6px 24px rgba(0,0,0,.05);overflow:hidden}
  .month-banner{padding:16px 0;text-align:center}
  .month-banner.july-banner{background:linear-gradient(135deg,#a5d6a7,#66bb6a);color:#fff}
  .month-banner.august-banner{background:linear-gradient(135deg,#ffcc80,#ff9800);color:#fff}
  .month-banner .month-title{font-size:20px;font-weight:700;letter-spacing:1px}
  .month-banner .month-sub{font-size:11px;font-weight:500;opacity:.85;margin-top:2px}
  .weekdays{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;font-size:11px;font-weight:700;color:var(--muted);padding:10px 0;background:#fafafa;border-bottom:1px solid var(--border);letter-spacing:.5px}
  .weekdays span:first-child,.weekdays span:last-child{color:#e53935}
  .days{display:grid;grid-template-columns:repeat(7,1fr)}
  .day{min-height:90px;padding:6px 5px;border-right:1px solid #f5f5f5;border-bottom:1px solid #f5f5f5;position:relative;cursor:pointer;transition:background .15s}
  .day:nth-child(7n){border-right:none}
  .day.empty{background:#fafafa;cursor:default}
  .day:hover:not(.empty){background:#fdfaef}
  .day-num{font-size:13px;font-weight:700;color:#555;width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:50%;margin-bottom:3px}
  .day-events{display:flex;flex-direction:column;gap:2px}
  .evt{font-size:10px;font-weight:600;line-height:1.25;padding:2px 5px;border-radius:4px;white-space:normal;word-break:break-all;cursor:pointer;transition:transform .1s,box-shadow .1s;border-left:3px solid transparent;text-align:left}
  .evt:hover{transform:translateY(-1px);box-shadow:0 1px 3px rgba(0,0,0,.1);z-index:2}
  .evt.chess{background:#e8f5e9;color:#43a047;border-left-color:#43a047}
  .evt.swim{background:#e3f2fd;color:#1e88e5;border-left-color:#1e88e5}
  .evt.comp{background:#ffebee;color:#e53935;border-left-color:#e53935;font-weight:700}
  .evt.travel{background:#fff3e0;color:#f57c00;border-left-color:#f57c00}
  .evt.camp{background:#f3e5f5;color:#8e24aa;border-left-color:#8e24aa}
  .evt.disney{background:#fce4ec;color:#e91e63;border-left-color:#e91e63}
  /* Modal */
  .modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.4);z-index:100;justify-content:center;align-items:flex-end}
  .modal-overlay.active{display:flex}
  .modal{background:#fff;width:100%;max-width:500px;border-radius:16px 16px 0 0;padding:24px 20px 32px;max-height:90vh;overflow-y:auto;animation:slideUp .25s}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .modal h2{font-size:18px;font-weight:700;margin-bottom:20px;text-align:center}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:12px;font-weight:700;color:#888;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
  .field input,.field select,.field textarea{width:100%;padding:10px 12px;border:2px solid #eee;border-radius:8px;font-size:14px;font-family:inherit;outline:none;transition:border-color .15s}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:#888}
  .field textarea{min-height:60px;resize:vertical}
  .field-row{display:flex;gap:10px}
  .field-row .field{flex:1}
  .field-row .field:last-child{flex:0 0 110px}
  .field-cb{display:flex;align-items:center;gap:8px}
  .field-cb input{width:auto}
  .field-cb label{display:inline;font-size:13px;color:#555;margin:0}
  .modal-actions{display:flex;gap:10px;margin-top:20px}
  .modal-actions .btn{flex:1;justify-content:center;padding:12px}
  .btn-save{background:#333;color:#fff}
  .btn-delete{background:#fff;color:#e53935;border:2px solid #e53935}
  .btn-cancel{background:#f0f0f0;color:#555}
  .btn-save:hover{background:#555}
  .btn-delete:hover{background:#ffebee}
  .btn-cancel:hover{background:#e0e0e0}
  .event-list{margin-bottom:16px}
  .event-item{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;margin-bottom:6px;background:#f9f9f9;border-radius:8px;font-size:13px}
  .event-item-name{font-weight:600;flex:1}
  .event-item-actions{display:flex;gap:6px}
  .event-item-actions button{background:none;border:none;font-size:11px;font-weight:600;padding:4px 8px;border-radius:4px;cursor:pointer}
  .event-item-actions .edit-btn{color:#1e88e5}
  .event-item-actions .del-btn{color:#e53935}
  /* Toast */
  .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none}
  .toast.show{opacity:1}
  .legend{display:flex;flex-wrap:wrap;gap:14px 24px;justify-content:center;background:var(--card);border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.04),0 6px 24px rgba(0,0,0,.05);padding:18px 28px;margin-bottom:28px}
  .legend-item{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:500}
  .legend-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}

  /* ---- Responsive ---- */
  @media (max-width: 780px) {
    .months { grid-template-columns: 1fr; }
  }
  @media (max-width: 480px) {
    body { padding: 16px 8px 32px; }
    .header h1 { font-size: 22px; }
    .header { margin-bottom: 16px; }
    .toolbar { gap: 8px; margin-bottom: 18px; }
    .btn { padding: 8px 14px; font-size: 13px; }
    .months { gap: 16px; margin-bottom: 20px; }
    .month-banner { padding: 12px 0; }
    .month-banner .month-title { font-size: 17px; }
    .month-banner .month-sub { font-size: 10px; }
    .weekdays { font-size: 10px; padding: 8px 0; }
    .day { min-height: 64px; padding: 4px 3px; }
    .day-num { font-size: 11px; width: 20px; height: 20px; margin-bottom: 1px; }
    .evt { font-size: 8px; padding: 1px 3px; border-radius: 2px; border-left-width: 2px; }
    .legend { gap: 8px 12px; padding: 12px 14px; margin-bottom: 20px; }
    .legend-item { font-size: 11px; gap: 5px; }
    .legend-dot { width: 10px; height: 10px; }
    .modal { border-radius: 16px 16px 0 0; padding: 20px 16px 28px; }
    .modal h2 { font-size: 16px; }
    .field input, .field select, .field textarea { font-size: 16px; }
  }
  @media (max-width: 380px) {
    .day { min-height: auto; padding: 3px 2px; }
    .day-num { font-size: 10px; width: 18px; height: 18px; }
    .evt { font-size: 7px; padding: 1px 2px; }
    .weekdays { font-size: 9px; }
  }
  @media print {
    body { background: #fff; padding: 0; }
    .month-card { box-shadow: none; border: 1px solid #ddd; break-inside: avoid; }
    .legend { box-shadow: none; border: 1px solid #ddd; }
    .day { min-height: 68px; }
    .toolbar, .modal-overlay { display: none !important; }
  }

</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🏖️ 陈泊儒的2026暑假</h1>
    <span class="sub">JULY · AUGUST</span>
  </div>
  <div class="toolbar">
    <button class="btn btn-add" onclick="openAddModal()">＋ 添加日程</button>
    <button class="btn btn-reset" onclick="resetEvents()">↺ 重置为默认</button>
  </div>
  <div class="months">
    <div class="month-card">
      <div class="month-banner july-banner"><div class="month-title">七月</div><div class="month-sub">JULY 2026</div></div>
      <div class="weekdays"><span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span></div>
      <div class="days" id="july-days"></div>
    </div>
    <div class="month-card">
      <div class="month-banner august-banner"><div class="month-title">八月</div><div class="month-sub">AUGUST 2026</div></div>
      <div class="weekdays"><span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span></div>
      <div class="days" id="august-days"></div>
    </div>
  </div>
  <div class="legend">
    <div class="legend-item"><span class="legend-dot" style="background:#43a047"></span> 国际象棋课</div>
    <div class="legend-item"><span class="legend-dot" style="background:#1e88e5"></span> 游泳课集训</div>
    <div class="legend-item"><span class="legend-dot" style="background:#e53935"></span> 国际象棋比赛</div>
    <div class="legend-item"><span class="legend-dot" style="background:#f57c00"></span> 新疆旅行</div>
    <div class="legend-item"><span class="legend-dot" style="background:#8e24aa"></span> 大鹏水上运动夏令营</div>
    <div class="legend-item"><span class="legend-dot" style="background:#e91e63"></span> 上海迪士尼营</div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal">
    <h2 id="modalTitle">添加日程</h2>
    <div class="event-list" id="dayEventsList"></div>
    <div class="field"><label>日程名称</label><input id="evtName" placeholder="如：钢琴课"></div>
    <div class="field-row">
      <div class="field"><label>开始日期</label><input type="date" id="evtStart"></div>
      <div class="field"><label>结束日期</label><input type="date" id="evtEnd"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>时间</label><input id="evtTime" placeholder="如 13:00-14:30"></div>
      <div class="field"><label>颜色</label><select id="evtColor"></select></div>
    </div>
    <div class="field"><label>备注</label><textarea id="evtNote" placeholder="接送信息等…"></textarea></div>
    <div class="field field-cb"><input type="checkbox" id="evtWeekendsOff"><label for="evtWeekendsOff">跳过周末</label></div>
    <div class="modal-actions">
      <button class="btn btn-cancel" id="btnCancel" onclick="closeModal()">取消</button>
      <button class="btn btn-delete" id="btnDelete" style="display:none" onclick="deleteEvent()">删除</button>
      <button class="btn btn-save" id="btnSave" onclick="saveEvent()">保存</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ============ DATA ============
const defaultEvents = [
  {id:1,title:"国际象棋课",start:"2026-07-04",end:"2026-07-14",time:"9:00-12:00",color:"chess",note:"妈妈送，刘阿姨接",wo:false},
  {id:2,title:"游泳课集训",start:"2026-07-13",end:"2026-07-24",time:"13:00-14:30",color:"swim",note:"刘阿姨接送并陪伴",wo:true},
  {id:3,title:"国际象棋比赛",start:"2026-07-18",end:"2026-07-18",time:"下午",color:"comp",note:"福田小学",wo:false},
  {id:4,title:"新疆旅行",start:"2026-07-25",end:"2026-08-01",time:"全天",color:"travel",note:"",wo:false},
  {id:5,title:"大鹏水上运动夏令营",start:"2026-08-02",end:"2026-08-07",time:"全天",color:"camp",note:"",wo:false},
  {id:6,title:"上海迪士尼夏令营",start:"2026-08-09",end:"2026-08-14",time:"全天",color:"disney",note:"",wo:false}
];
const colors = [
  {id:"chess",name:"🟢 绿色",bg:"#e8f5e9",fg:"#43a047"},
  {id:"swim",name:"🔵 蓝色",bg:"#e3f2fd",fg:"#1e88e5"},
  {id:"comp",name:"🔴 红色",bg:"#ffebee",fg:"#e53935"},
  {id:"travel",name:"🟠 橙色",bg:"#fff3e0",fg:"#f57c00"},
  {id:"camp",name:"🟣 紫色",bg:"#f3e5f5",fg:"#8e24aa"},
  {id:"disney",name:"🌸 粉色",bg:"#fce4ec",fg:"#e91e63"},
  {id:"custom1",name:"🟡 黄色",bg:"#fffde7",fg:"#f9a825"},
  {id:"custom2",name:"🩵 青色",bg:"#e0f7fa",fg:"#0097a7"},
  {id:"custom3",name:"🤎 棕色",bg:"#efebe9",fg:"#6d4c41"}
];

function loadEvents(){
  try{return JSON.parse(localStorage.getItem("schedule2026")||"null")||defaultEvents.slice()}catch(e){return defaultEvents.slice()}
}
function saveEvents(evts){localStorage.setItem("schedule2026",JSON.stringify(evts))}

let events = loadEvents();
let editId = null;

// ============ RENDER ============
function isInRange(d,s,e){var dt=new Date(d),st=new Date(s),et=new Date(e);return dt>=st&&dt<=et}
function getEventsForDay(ds){
  var dw=new Date(ds).getDay();
  return events.filter(function(ev){
    if(!isInRange(ds,ev.start,ev.end))return false;
    if(ev.wo&&(dw===0||dw===6))return false;
    return true;
  });
}

function renderMonth(cid,y,m){
  var c=document.getElementById(cid);c.innerHTML="";
  var fd=new Date(y,m-1,1),ld=new Date(y,m,0),sd=fd.getDay();
  for(var i=0;i<sd;i++){c.appendChild(ce("div","day empty","<span class=day-num></span>"))}
  for(var d=1;d<=ld.getDate();d++){
    var mm=String(m).padStart(2,"0"),dd=String(d).padStart(2,"0"),ds=y+"-"+mm+"-"+dd;
    var day=ce("div","day",'<span class=day-num>'+d+"</span>");
    day.setAttribute("data-date",ds);
    day.onclick=function(){openModalForDay(this.getAttribute("data-date"))};
    var evts=getEventsForDay(ds),eh='<div class=day-events>';
    evts.forEach(function(ev){eh+='<span class="evt '+ev.color+'" data-id="'+ev.id+'" onclick="event.stopPropagation();editEvent('+ev.id+')">'+ev.title+(ev.time?' '+ev.time:'')+"</span>"});
    eh+="</div>";day.innerHTML+=eh;c.appendChild(day);
  }
}
function render(){renderMonth("july-days",2026,7);renderMonth("august-days",2026,8)}
function ce(tag,cls,html){var e=document.createElement(tag);if(cls)e.className=cls;if(html)e.innerHTML=html;return e}

// ============ MODAL ============
function openModalForDay(ds){
  var evts=getEventsForDay(ds);
  var list=document.getElementById("dayEventsList");
  if(evts.length>0){
    list.style.display="block";list.innerHTML="";
    evts.forEach(function(ev){
      var item=ce("div","event-item");
      item.innerHTML='<span class=event-item-name>'+ev.title+" ("+ev.time+")</span><div class=event-item-actions><button class=edit-btn onclick=editEvent('+ev.id+')>编辑</button><button class=del-btn onclick="if(confirm(\"删除?'+ev.title+'\")){deleteEventById('+ev.id+')}">删除</button></div>';
      list.appendChild(item);
    });
    list.innerHTML+='<button class="btn btn-add" style="width:100%;margin-top:6px;font-size:12px;padding:8px" onclick="openAddModal(\"'+(ds)+'\")">＋ 新增日程</button>';
  }else{list.style.display="none";openAddModal(ds);return;}
  document.getElementById("modalTitle").textContent=ds+" 日程";
  document.getElementById("modalOverlay").classList.add("active");
  
}

function openAddModal(dateStr){
  editId=null;
  document.getElementById("modalTitle").textContent="添加日程";
  document.getElementById("dayEventsList").style.display="none";
  document.getElementById("evtName").value="";
  document.getElementById("evtStart").value=dateStr||"2026-07-01";
  document.getElementById("evtEnd").value=dateStr||"2026-07-01";
  document.getElementById("evtTime").value="";
  document.getElementById("evtNote").value="";
  document.getElementById("evtColor").value="chess";
  document.getElementById("evtWeekendsOff").checked=false;
  document.getElementById("btnDelete").style.display="none";
  document.getElementById("btnSave").textContent="保存";
  
  document.getElementById("modalOverlay").classList.add("active");
}

function editEvent(id){
  editId=id;
  var ev=events.find(function(e){return e.id===id});
  if(!ev)return;
  document.getElementById("modalTitle").textContent="编辑日程";
  document.getElementById("dayEventsList").style.display="none";
  document.getElementById("evtName").value=ev.title;
  document.getElementById("evtStart").value=ev.start;
  document.getElementById("evtEnd").value=ev.end;
  document.getElementById("evtTime").value=ev.time;
  document.getElementById("evtNote").value=ev.note||"";
  document.getElementById("evtColor").value=ev.color;
  document.getElementById("evtWeekendsOff").checked=ev.wo;
  document.getElementById("btnDelete").style.display="";
  document.getElementById("btnSave").textContent="更新";
  
  document.getElementById("modalOverlay").classList.add("active");
}


  document.querySelectorAll(".field-row").forEach(function(r){r.style.display="none"});
}

  document.querySelectorAll(".field-row").forEach(function(r){r.style.display="flex"});
  document.getElementById("btnDelete").style.display=editId?"":"none";
}

function closeModal(){document.getElementById("modalOverlay").classList.remove("active")}

function saveEvent(){
  var name=document.getElementById("evtName").value.trim();
  if(!name){toastMsg("请输入日程名称");return}
  var start=document.getElementById("evtStart").value;
  var end=document.getElementById("evtEnd").value;
  var time=document.getElementById("evtTime").value.trim();
  var color=document.getElementById("evtColor").value;
  var note=document.getElementById("evtNote").value.trim();
  var wo=document.getElementById("evtWeekendsOff").checked;
  if(editId){
    var ev=events.find(function(e){return e.id===editId});
    if(ev){ev.title=name;ev.start=start;ev.end=end;ev.time=time;ev.color=color;ev.note=note;ev.wo=wo}
  }else{
    var maxId=events.reduce(function(m,e){return Math.max(m,e.id)},0);
    events.push({id:maxId+1,title:name,start:start,end:end,time:time,color:color,note:note,wo:wo});
  }
  saveEvents(events);closeModal();render();toastMsg(editId?"已更新":"已添加");
  editId=null;
}

function deleteEvent(){
  if(!editId)return;
  deleteEventById(editId);
  closeModal();
}
function deleteEventById(id){
  if(!confirm("确认删除此日程？"))return;
  events=events.filter(function(e){return e.id!==id});
  saveEvents(events);render();toastMsg("已删除");
}

function resetEvents(){
  if(!confirm("重置为默认日程？你添加的内容会丢失。"))return;
  events=defaultEvents.slice();saveEvents(events);render();toastMsg("已重置");
}

function toastMsg(m){
  var t=document.getElementById("toast");t.textContent=m;t.classList.add("show");
  setTimeout(function(){t.classList.remove("show")},1800);
}

// ============ INIT ============
(function(){
  var sel=document.getElementById("evtColor");
  colors.forEach(function(c){sel.innerHTML+='<option value="'+c.id+'">'+c.name+"</option>"});
  render();
})();
</script>
</body>
</html>
